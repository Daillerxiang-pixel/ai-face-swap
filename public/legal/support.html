<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术支持 - AI换图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            overflow: hidden;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 600;
        }
        .logo p {
            color: #888;
            margin-top: 8px;
        }
        .content {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-icon {
            width: 44px;
            height: 44px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        .contact-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .contact-info p {
            color: #888;
            font-size: 14px;
        }
        .contact-info a {
            color: #667eea;
            text-decoration: none;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
        .faq {
            margin-top: 32px;
        }
        .faq-item {
            margin-bottom: 16px;
        }
        .faq-item h4 {
            font-size: 15px;
            color: #667eea;
            margin-bottom: 8px;
        }
        .faq-item p {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <img src="app_icon.png" alt="AI换图">
            </div>
            <h1>AI换图</h1>
            <p>智能换脸工具</p>
        </div>
        
        <div class="content">
            <h2>联系我们</h2>
            
            <div class="contact-item">
                <div class="contact-icon">📧</div>
                <div class="contact-info">
                    <h3>电子邮件</h3>
                    <p><a href="mailto:support@kanashortplay.com">support@kanashortplay.com</a></p>
                </div>
            </div>
            
            <div class="contact-item">
                <div class="contact-icon">💬</div>
                <div class="contact-info">
                    <h3>微信客服</h3>
                    <p>AI换图官方客服</p>
                </div>
            </div>
            
            <div class="contact-item">
                <div class="contact-icon">🌐</div>
                <div class="contact-info">
                    <h3>官方网站</h3>
                    <p><a href="https://test.kanashortplay.com" target="_blank">test.kanashortplay.com</a></p>
                </div>
            </div>
            
            <div class="faq">
                <h2>常见问题</h2>
                
                <div class="faq-item">
                    <h4>如何获取更多模板？</h4>
                    <p>我们持续更新模板库，VIP会员可解锁全部高级模板。</p>
                </div>
                
                <div class="faq-item">
                    <h4>换图效果不满意怎么办？</h4>
                    <p>请确保上传照片清晰、正脸、光线充足。如仍有问题，请联系客服。</p>
                </div>
                
                <div class="faq-item">
                    <h4>如何取消订阅？</h4>
                    <p>在App Store或应用内「设置-订阅管理」中取消，取消后当前周期仍有效。</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 AI换图 版权所有</p>
        </div>
    </div>
</body>
</html>
