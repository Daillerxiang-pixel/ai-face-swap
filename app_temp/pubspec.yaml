name: face_swap
description: AI Face Swap — face swap templates and generation
publish_to: 'none'
# iOS CFBundleVersion：本地打包会取 + 号后数字；CI 用 --build-number 覆盖。上传 TestFlight 须严格递增。
version: 1.5.13+58

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.9.2
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  photo_view: ^0.15.0
  fluttertoast: ^8.2.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  image_gallery_saver_plus: ^4.0.1
  path_provider: ^2.1.5
  video_player: ^2.8.0
  package_info_plus: ^8.0.0
  flutter_sticky_header: ^0.6.5
  share_plus: ^10.0.0
  sign_in_with_apple: ^6.1.0
  in_app_purchase: ^3.1.0
  in_app_purchase_storekit: ^0.4.0
  net_layer:
    path: ../packages/net_layer
  auth_suite:
    path: ../packages/auth_suite
  iap_suite:
    path: ../packages/iap_suite
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/legal/
