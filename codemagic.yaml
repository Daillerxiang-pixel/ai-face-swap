# ============================================================
# Codemagic CI/CD Configuration — AI换脸 iOS 云端构建
# 自动签名模式（App Store Connect API Key）
# ============================================================
# 使用方法：
# 1. Codemagic 控制台 → App Settings → Environment variables
#    添加以下环境变量：
#    - APP_STORE_CONNECT_KEY: .p8 文件内容（base64 编码）
#    - APP_STORE_CONNECT_KEY_ID: TLZ3BSRNX7
#    - APP_STORE_CONNECT_ISSUER: f1615060-0527-4598-91c5-5449d44c615b
# 2. Codemagic Web UI: 上传 .p8 文件并填入 Key ID / Issuer ID
# 3. 点击 Start build 触发构建
# ============================================================

workflows:
  ios-workflow:
    name: iOS Build (App Store)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      # Step 1: 获取 Flutter 依赖
      - name: Get Flutter dependencies
        script: |
          cd app_temp
          flutter packages pub get

      # Step 2: iOS 代码签名配置
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.aihuantu.faceswap" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      # Step 3: 构建 iOS IPA
      - name: Build iOS
        script: |
          cd app_temp
          flutter build ipa \
            --release \
            --export-options-plist=export_options.plist

    artifacts:
      - app_temp/build/ios/ipa/*.ipa

  ios-adhoc-workflow:
    name: iOS Build (Ad-Hoc / TestFlight)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd app_temp
          flutter packages pub get

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          cd app_temp
          flutter build ipa \
            --release \
            --export-options-plist=export_options_adhoc.plist

    artifacts:
      - app_temp/build/ios/ipa/*.ipa
