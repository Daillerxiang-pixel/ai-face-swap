# ============================================================
# Codemagic CI/CD Configuration — AI换脸 iOS 云端构建
# 自动签名模式（App Store Connect API Key）
# ============================================================
# 使用方法：
# 1. Codemagic 控制台关联此 Git 仓库
# 2. Codemagic Web UI: 上传 .p8 文件并填入 Key ID / Issuer ID
# 3. 点击 Start build 触发构建
# ============================================================

workflows:
  ios-workflow:
    name: iOS Build (App Store)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      # Step 1: 获取 Flutter 依赖
      - name: Get Flutter dependencies
        script: |
          cd app_temp
          flutter packages pub get

      # Step 2: iOS 代码签名配置（自动创建 Certificate + Profile）
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.aihuantu.faceswap" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Step 3: 构建 iOS IPA
      - name: Build iOS
        script: |
          cd app_temp
          flutter build ipa \
            --release \
            --export-options-plist=export_options.plist

    artifacts:
      - app_temp/build/ios/ipa/*.ipa

  ios-adhoc-workflow:
    name: iOS Build (Ad-Hoc / TestFlight)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd app_temp
          flutter packages pub get

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.aihuantu.faceswap" \
            --type IOS_ADHOC \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          cd app_temp
          flutter build ipa \
            --release \
            --export-options-plist=export_options_adhoc.plist

    artifacts:
      - app_temp/build/ios/ipa/*.ipa
