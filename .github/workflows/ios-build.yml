name: iOS Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_CERTIFICATE" | grep -v "^-----" | tr -d '\r' | base64 --decode -o certificate.p12
          file certificate.p12

          security create-keychain -p build build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p build build.keychain
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k build.keychain -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s build.keychain
          security default-keychain -s build.keychain

          security find-identity -v build.keychain

          echo "$APPLE_PROVISIONING_PROFILE" | grep -v "^-----" | tr -d '\r' | base64 --decode -o provisioning.mobileprovision
          file provisioning.mobileprovision

          security cms -D -i provisioning.mobileprovision -o provisioning.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" provisioning.plist)
          echo "Profile Name: $PROFILE_NAME"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provisioning.plist)
          echo "Profile UUID: $PROFILE_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Build iOS Archive
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*
          cd app_temp
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        run: |
          security default-keychain -s build.keychain
          security unlock-keychain -p build build.keychain

          python3 -c "
          import plistlib, os
          plist = {
              'method': 'release-testing',
              'teamID': 'FDA4AA9W96',
              'signingStyle': 'manual',
              'provisioningProfiles': {
                  'com.aihuantu.faceswap': os.environ['PROFILE_NAME']
              },
              'signingCertificate': 'Apple Distribution'
          }
          with open('app_temp/ios/export_options.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "

          cat app_temp/ios/export_options.plist

          cd app_temp
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ios/export_options.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ipa/*.ipa
          retention-days: 14
