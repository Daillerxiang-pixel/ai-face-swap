name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app_temp/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_CERTIFICATE" | grep -v "^-----" | tr -d '\r' | base64 --decode -o certificate.p12

          security create-keychain -p build ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -lut 21600 ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p build ~/Library/Keychains/build.keychain-db
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s ~/Library/Keychains/build.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain-db
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security find-identity -v ~/Library/Keychains/build.keychain-db

          printf '%s' "$APPLE_PROVISIONING_PROFILE" | base64 -d -o provisioning.mobileprovision

          security cms -D -i provisioning.mobileprovision -o provisioning.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" provisioning.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provisioning.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" provisioning.plist)
          echo "Profile: $PROFILE_NAME | UUID: $PROFILE_UUID | Team: $TEAM_ID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          
          # Verify profile installed
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # List all installed profiles
          echo "=== Installed profiles ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            security cms -D -i "$f" 2>/dev/null | grep -A1 "<key>Name</key>" | tail -1 | sed 's/.*<string>//;s/<.*//'
          done

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      - name: Build Archive (Flutter automatic signing)
        run: |
          cd app_temp
          # Build archive only - let Flutter handle archive with automatic signing
          flutter build ipa --export-method app-store 2>&1 | tee build.log || true

          if [ ! -d "build/ios/archive/Runner.xcarchive" ]; then
            echo "ERROR: Archive not created!"
            cat build.log
            exit 1
          fi
          echo "✓ Archive created: $(du -sh build/ios/archive/Runner.xcarchive)"

      - name: Export IPA (manual signing with profile)
        run: |
          cd app_temp
          mkdir -p build/ios/ipa

          # Create ExportOptions.plist with manual signing
          cat > build/ios/ipa/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aihuantu.faceswap</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "=== ExportOptions ==="
          cat build/ios/ipa/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist build/ios/ipa/ExportOptions.plist \
            -exportPath build/ios/ipa \
            2>&1 | tee -a build.log

          echo "=== IPA Output ==="
          find build/ios/ipa -name "*.ipa" -exec ls -lh {} \; 2>/dev/null || echo "NO IPA FOUND"
        timeout-minutes: 15

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-ipa
          path: |
            app_temp/build/ios/ipa/*.ipa
            app_temp/build.log
          retention-days: 30
