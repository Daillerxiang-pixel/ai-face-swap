name: iOS Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # 3. 获取依赖
      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios && pod install

      # 4. 安装证书和 Provisioning Profile
      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # 解码证书为 .p12（去除 certutil 生成的头尾标记）
          echo "$APPLE_CERTIFICATE" | grep -v "^-----" | base64 --decode -o certificate.p12

          # 创建临时钥匙串
          security create-keychain -p build build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p build build.keychain

          # 导入证书到钥匙串
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k build.keychain -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s build.keychain

          # 列出签名身份供调试
          security find-identity -v build.keychain

          # 解码并安装 Provisioning Profile（Xcode 要求以 UUID 命名）
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "$APPLE_PROVISIONING_PROFILE" | grep -v "^-----" | base64 --decode -o provisioning.mobileprovision
          # 提取 UUID 并重命名，Xcode 才能识别
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i provisioning.mobileprovision)")
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile: ${PROFILE_UUID}.mobileprovision"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # 5. 构建 iOS（禁用签名验证，避免冲突）
      - name: Build iOS
        run: |
          cd app_temp
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 6. 导出 IPA（切换默认钥匙串）
      - name: Export IPA
        run: |
          security default-keychain -s build.keychain
          security unlock-keychain -p build build.keychain
          cd app_temp
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ios/export_options.plist \
            -exportPath build/ipa

      # 7. 验证 IPA
      - name: Verify IPA
        run: |
          find app_temp/build -name "*.ipa" -type f
          ls -lh app_temp/build/ipa/Runner.ipa

      # 8. 上传 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ipa/Runner.ipa
          retention-days: 14
