name: iOS Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd app_temp && flutter pub get

      - name: Setup iOS Podfile
        run: |
          cd app_temp/ios
          # Create Podfile if missing
          if [ ! -f Podfile ]; then
            cat > Podfile << 'EOF'
platform :ios, '12.0'

project 'Runner', {
  'Debug' => :debug,
  'Profile' => :release,
  'Release' => :release,
}

ENV['COCOAPODS_DISABLE_STATS'] = 'true'

pre_install do |installer|
  installer.pod_targets.each do |pod|
    target_uc = pod.target_uuids.map { |uuid| installer.sandbox.target_for(uuid) }.compact.first
    target_uc.build_configurations.each do |bc|
      bc.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
    end
  end
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
    end
  end
end

EOF
          fi
          pod install --repo-update

      - name: Setup certificates
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security import faceswap.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security find-identity -v
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build iOS
        run: |
          cd app_temp
          flutter build ipa --release

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ios/ipa/*.ipa
          retention-days: 14
