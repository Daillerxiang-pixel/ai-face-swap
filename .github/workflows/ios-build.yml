name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app_temp/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_CERTIFICATE" | grep -v "^-----" | tr -d '\r' | base64 --decode -o certificate.p12

          security create-keychain -p build ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -lut 21600 ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p build ~/Library/Keychains/build.keychain-db
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s ~/Library/Keychains/build.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain-db
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security find-identity -v ~/Library/Keychains/build.keychain-db

          printf '%s' "$APPLE_PROVISIONING_PROFILE" | base64 -d -o provisioning.mobileprovision

          security cms -D -i provisioning.mobileprovision -o provisioning.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" provisioning.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provisioning.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" provisioning.plist)
          echo "Profile: $PROFILE_NAME | UUID: $PROFILE_UUID | Team: $TEAM_ID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          # Patch Xcode project profile name
          cd app_temp/ios
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "FaceSwap-AI"/PROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'"/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = FaceSwap-AI/PROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'"/g' Runner.xcodeproj/project.pbxproj
          cd $GITHUB_WORKSPACE

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      - name: Build Archive
        run: |
          cd app_temp
          flutter build ipa --export-method app-store 2>&1 | tee build.log || true

          if [ ! -d "build/ios/archive/Runner.xcarchive" ]; then
            echo "ERROR: Archive not created!"
            cat build.log
            exit 1
          fi
          echo "✓ Archive: $(du -sh build/ios/archive/Runner.xcarchive)"

      - name: Export IPA
        run: |
          cd app_temp
          mkdir -p build/ios/ipa

          cat > build/ios/ipa/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aihuantu.faceswap</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist build/ios/ipa/ExportOptions.plist \
            -exportPath build/ios/ipa \
            2>&1 | tee -a build.log

          echo "=== IPA ==="
          find build/ios/ipa -name "*.ipa" -exec ls -lh {} \; 2>/dev/null || echo "NO IPA"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_KEY" | base64 -d > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          # Find IPA
          IPA_PATH=$(find app_temp/build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found, skipping upload"
            exit 0
          fi
          echo "Uploading: $IPA_PATH ($(du -sh "$IPA_PATH"))"

          # Upload via altool
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER" \
            2>&1 | tee -a app_temp/build.log

          echo "✅ Upload complete! Check App Store Connect > TestFlight"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-ipa
          path: |
            app_temp/build/ios/ipa/*.ipa
            app_temp/build.log
          retention-days: 30
