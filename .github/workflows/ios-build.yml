name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # 3. 获取依赖
      - name: Get Flutter dependencies
        shell: bash
        run: |
          cd app_temp && flutter pub get

      # 4. 配置证书和 Provisioning Profile
      - name: Setup signing certificates
        shell: bash
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "=== 复制证书到app_temp ==="
          cp faceswap.p12 app_temp/
          cp provisioning.mobileprovision app_temp/
          cd app_temp && pwd
          echo "=== 证书文件是否存在 ==="
          test -f faceswap.p12 && echo "faceswap.p12 存在" || echo "faceswap.p12 不存在"
          test -f provisioning.mobileprovision && echo "provisioning.mobileprovision 存在" || echo "不存在"
          echo "=== 创建新钥匙串 ==="
          security create-keychain -p test test.keychain
          security set-keychain-settings -lut 21600 test.keychain
          security unlock-keychain -p test test.keychain
          echo "=== 导入证书到新钥匙串 ==="
          security import faceswap.p12 -P $APPLE_CERTIFICATE_PASSWORD -k test.keychain -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k test.keychain -s
          security list-keychains -s test.keychain
          security default-keychain -s test.keychain
          echo "=== 安装 Provisioning Profile ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== 列出证书 ==="
          security find-identity -v
          echo "=== 完成 ==="

      # 5. 构建 iOS IPA
      - name: Build iOS
        shell: bash
        run: |
          cd app_temp && flutter build ipa --release

      # 6. 上传 IPA 作为构建产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ios/ipa/*.ipa
          retention-days: 14
