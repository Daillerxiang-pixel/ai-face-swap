name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app_temp/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_CERTIFICATE" | grep -v "^-----" | tr -d '\r' | base64 --decode -o certificate.p12
          file certificate.p12

          security create-keychain -p build ~/Library/Keychains/build.keychain-db
          security set-keychain-settings -lut 21600 ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p build ~/Library/Keychains/build.keychain-db
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k ~/Library/Keychains/build.keychain-db -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s ~/Library/Keychains/build.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain-db
          security list-keychains -s ~/Library/Keychains/build.keychain-db

          security find-identity -v ~/Library/Keychains/build.keychain-db

          printf '%s' "$APPLE_PROVISIONING_PROFILE" | base64 -d -o provisioning.mobileprovision
          file provisioning.mobileprovision

          security cms -D -i provisioning.mobileprovision -o provisioning.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" provisioning.plist)
          echo "Profile Name: $PROFILE_NAME"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" provisioning.plist)
          echo "Profile UUID: $PROFILE_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Prepare export options
        run: |
          cd app_temp
          python3 -c "
          import plistlib, os
          plist = {
              'method': 'app-store',
              'teamID': 'FDA4AA9W96',
              'signingStyle': 'manual',
              'compileBitcode': False,
              'stripSwiftSymbols': True,
              'provisioningProfiles': {
                  'com.aihuantu.faceswap': os.environ['PROFILE_NAME']
              },
              'signingCertificate': 'Apple Distribution'
          }
          with open('ios/export_options.plist', 'wb') as f:
              plistlib.dump(plist, f)
          "
          cat ios/export_options.plist

      - name: Build IPA
        run: |
          security list-keychains -s ~/Library/Keychains/build.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain-db
          security unlock-keychain -p build ~/Library/Keychains/build.keychain-db
          security find-identity -v

          # Fix profile name mismatch
          cd app_temp/ios
          find . -name '*.pbxproj' -exec sed -i '' 's/FaceSwap-AI/faceswap-ai/g' {} +

          # Auto-increment build number
          BN="${{ github.run_number }}"
          echo "iOS build number: ${BN}"
          cd ..
          flutter build ipa --release \
            --dart-define=API_BASE=https://api.deepfaceswap.tech \
            --build-number="${BN}" \
            --export-options-plist=ios/export_options.plist

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          # Decode base64 p8 key and write to all locations altool checks
          mkdir -p ~/.appstoreconnect/private_keys
          mkdir -p ./private_keys
          echo "$APP_STORE_CONNECT_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          echo "$APP_STORE_CONNECT_KEY" | base64 -d > ./private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Verify file
          echo "Key file content check:"
          head -1 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          IPA=$(find app_temp/build/ios/ipa -name '*.ipa' | head -1)
          echo "Uploading: $IPA"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER" 2>&1 | tee upload.log

          if grep -q "No errors uploading" upload.log; then
            echo "✅ Upload successful!"
          else
            echo "❌ Upload failed, full log:"
            cat upload.log
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: app_temp/build/ios/ipa/*.ipa
          retention-days: 14
