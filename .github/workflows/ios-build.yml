name: iOS Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # 3. 获取依赖
      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get
          cd ios && pod install

      # 4. 安装证书和 Provisioning Profile
      - name: Setup signing certificate and profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # 解码证书为 .p12
          echo "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12

          # 创建临时钥匙串
          security create-keychain -p build build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p build build.keychain

          # 导入证书到钥匙串
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k build.keychain -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k build -s build.keychain

          # 列出可用签名身份（调试用）
          security find-identity -v build.keychain

          # 解码并安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o provisioning.mobileprovision
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # 验证 Profile 已安装
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # 5. 构建 iOS（禁用自动签名，避免冲突）
      - name: Build iOS
        run: |
          cd app_temp
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # 6. 导出 IPA（使用已安装的证书和 Profile）
      - name: Export IPA
        run: |
          cd app_temp
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ios/export_options.plist \
            -exportPath build/ipa \
            -keychain build.keychain \
            -keychain-password build

      # 7. 验证 IPA 存在
      - name: Verify IPA
        run: |
          ls -la app_temp/build/ipa/
          find app_temp/build -name "*.ipa" -type f

      # 8. 上传 IPA 作为构建产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ipa/Runner.ipa
          retention-days: 14
