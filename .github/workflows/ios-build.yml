name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # 3. 获取依赖
      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get

      # 4. 配置证书和 Provisioning Profile
      - name: Setup signing certificates
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # 列出当前钥匙串
          security list-keychains
          security default-keychain
          
          # 导入证书到默认钥匙串
          security import faceswap.p12 -P $APPLE_CERTIFICATE_PASSWORD -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          
          # 安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # 列出证书
          security find-identity -v
          security list-keychains

      # 5. 构建 iOS IPA
      - name: Build iOS
        run: |
          cd app_temp
          flutter build ipa --release

      # 6. 上传 IPA 作为构建产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ios/ipa/*.ipa
          retention-days: 14
