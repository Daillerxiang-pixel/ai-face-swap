name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      # 3. 获取依赖
      - name: Get Flutter dependencies
        run: |
          cd app_temp
          flutter pub get

      # 4. 配置证书和 Provisioning Profile
      - name: Setup signing certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # 将 base64 证书解码为 .p12 文件
          echo "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12

          # 解码 provisioning profile
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o provisioning.mobileprovision

          # 导入证书到钥匙串
          security create-keychain -p build build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p build build.keychain
          security import certificate.p12 -P $APPLE_CERTIFICATE_PASSWORD -k build.keychain -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k build -s build.keychain

          # 安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # 列出已安装的证书（调试用）
          security find-identity -v build.keychain

      # 5. 构建 iOS IPA
      - name: Build iOS
        run: |
          cd app_temp
          flutter build ipa \
            --release \
            --export-options-plist=export_options.plist \
            --code-signing-style=automatic

      # 6. 上传 IPA 作为构建产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: face-swap-ipa
          path: app_temp/build/ios/ipa/*.ipa
          retention-days: 14
