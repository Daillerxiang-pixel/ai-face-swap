# AI 换图 - Nginx 反向代理配置
# 服务器 IP: 39.102.100.123
# 后端服务：http://127.0.0.1:8080

# HTTP 服务器（自动跳转 HTTPS）
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 后续改为实际域名，如 aihuantu.com

    # ACME challenge（Let's Encrypt 证书验证）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有 HTTP 请求跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;  # 后续改为实际域名

    # SSL 证书配置
    # 生产环境使用 Let's Encrypt:
    # ssl_certificate /etc/letsencrypt/live/aihuantu.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aihuantu.com/privkey.pem;
    
    # 测试环境使用自签名证书:
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态文件（前端原型）
    location / {
        root /var/www/ai-face-swap/prototype;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        
        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 上传大小限制（允许大图片）
        client_max_body_size 20M;
    }

    # 上传文件（可选：直接由 Nginx 提供）
    location /uploads/ {
        # 方案 A：由后端服务提供（推荐，便于权限控制）
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # 方案 B：直接提供文件（需要确保文件权限安全）
        # alias /var/www/ai-face-swap/uploads/;
        # expires 1d;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # 日志配置
    access_log /var/log/nginx/ai-face-swap-access.log;
    error_log /var/log/nginx/ai-face-swap-error.log;
}

# 性能优化
http {
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # 连接优化
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
}
