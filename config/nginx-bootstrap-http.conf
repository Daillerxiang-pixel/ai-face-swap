# 首次部署：仅 HTTP，用于签发 Let's Encrypt 证书后再换 nginx-prod.conf
# 放置：/etc/nginx/sites-available/ai-face-swap.conf → sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name test.kanashortplay.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /admin {
        alias /var/www/ai-face-swap/admin;
        try_files $uri $uri/ /admin/login.html;
        index login.html;
    }

    location / {
        root /var/www/ai-face-swap/prototype;
        try_files $uri $uri/ /index.html;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    access_log /var/log/nginx/ai-face-swap-access.log;
    error_log /var/log/nginx/ai-face-swap-error.log;
}
