# 测试域名 test1.kanashortplay.com — 仅 HTTP（签发 Let's Encrypt 后换 nginx-test1.conf）
# 应用目录：/var/www/ai-face-swap-test ；Node 监听：127.0.0.1:8082（勿与 ibooks:8081 冲突）

server {
    listen 80;
    listen [::]:80;
    server_name test1.kanashortplay.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /admin {
        alias /var/www/ai-face-swap-test/admin;
        try_files $uri $uri/ /admin/login.html;
        index login.html;
    }

    location / {
        root /var/www/ai-face-swap-test/prototype;
        try_files $uri $uri/ /index.html;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff2)$ {
            expires 1h;
            add_header Cache-Control "public";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    access_log /var/log/nginx/ai-face-swap-test1-access.log;
    error_log /var/log/nginx/ai-face-swap-test1-error.log;
}
