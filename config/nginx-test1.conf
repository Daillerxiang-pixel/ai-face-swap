# AI 换图 — 测试环境 Nginx（test1.kanashortplay.com）
# 与 ibooks 同机时：ibooks 使用 8081，本应用测试实例使用 8082

server {
    listen 80;
    listen [::]:80;
    server_name test1.kanashortplay.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test1.kanashortplay.com;

    ssl_certificate /etc/letsencrypt/live/test1.kanashortplay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test1.kanashortplay.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /admin {
        alias /var/www/ai-face-swap-test/admin;
        try_files $uri $uri/ /admin/login.html;
        index login.html;
    }

    location / {
        root /var/www/ai-face-swap-test/prototype;
        try_files $uri $uri/ /index.html;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff2)$ {
            expires 1h;
            add_header Cache-Control "public";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8082/health;
        access_log off;
    }

    access_log /var/log/nginx/ai-face-swap-test1-access.log;
    error_log /var/log/nginx/ai-face-swap-test1-error.log;
}
