<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Face Swap - App Icon 方案对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #0a0a0f; color: #fff;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 40px; gap: 60px; min-height: 100vh;
}
h1 { font-size: 28px; background: linear-gradient(135deg, #7C3AED, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #8E8E93; font-size: 14px; margin-top: 8px; }
.versions { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
.version { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.version-label { font-size: 18px; font-weight: 600; }
.version-desc { color: #8E8E93; font-size: 13px; max-width: 260px; text-align: center; line-height: 1.5; }
.version img { width: 200px; height: 200px; border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.small-row { display: flex; gap: 24px; align-items: end; }
.small-row img { width: 60px; height: 60px; border-radius: 14px; }
.small-row .label { font-size: 11px; color: #48484A; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<h1>AI Face Swap — App Icon 设计方案</h1>
<p class="subtitle">面向海外用户 · 纯图形 · 无文字 · 现代科技感</p>

<div class="versions">
    <div class="version">
        <div class="version-label">V1 · Face Merge</div>
        <img src="app_icon_v1.png">
        <div class="version-desc">双人脸轮廓重叠 + 渐变描边 + 弧线换脸箭头 + AI 光效粒子。直接表达换脸概念。</div>
        <div class="small-row">
            <div><img src="app_icon_v1.png"><div class="label">1024px</div></div>
        </div>
    </div>
    <div class="version">
        <div class="version-label">V2 · AI Lens</div>
        <img src="app_icon_v2.png">
        <div class="version-desc">相机镜头环形设计 + 内嵌双脸符号 + 渐变光环。科技感与摄影工具属性结合。</div>
        <div class="small-row">
            <div><img src="app_icon_v2.png"><div class="label">1024px</div></div>
        </div>
    </div>
    <div class="version">
        <div class="version-label">V3 · Split Face</div>
        <img src="app_icon_v3.png">
        <div class="version-desc">分割人脸设计（左白右紫）+ 渐变中线 + 风格化五官。表达"变换/蜕变"概念。</div>
        <div class="small-row">
            <div><img src="app_icon_v3.png"><div class="label">1024px</div></div>
        </div>
    </div>
</div>
</body>
</html>
