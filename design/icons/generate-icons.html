<!DOCTYPE html>
<html>
<head>
<style>
body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 30px; }
h1 { color: #fff; font-family: sans-serif; background: linear-gradient(90deg, #EC4899, #7C3AED, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.icons { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
.icon-card { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.icon-card h2 { color: #fff; font-family: sans-serif; font-size: 18px; }
.icon-card p { color: #8E8E93; font-family: sans-serif; font-size: 13px; max-width: 280px; text-align: center; line-height: 1.5; }
.icon-card img { width: 220px; height: 220px; border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: rgba(124,58,237,0.2); color: #A78BFA; margin-top: 4px; }
</style>
</head>
<body>
<h1>AI换图 App Icon — 新设计方案</h1>
<div class="icons">
    <div class="icon-card">
        <h2>方案 A：神经网络肖像</h2>
        <img src="icon-new-a.svg">
        <p>橙粉紫渐变背景 + 写实人像 + 霓虹神经网络节点 + AI徽章。色彩活泼，层次丰富。</p>
        <span class="tag">高饱和渐变 · 神经网络 · AI徽章</span>
    </div>
    <div class="icon-card">
        <h2>方案 B：双脸变换</h2>
        <img src="icon-new-b.svg">
        <p>深色背景 + 青粉双人脸叠放 + 渐变变换箭头 + 霓虹光效。直观展示换脸概念。</p>
        <span class="tag">双脸叠放 · 变换箭头 · 霓虹光效</span>
    </div>
    <div class="icon-card">
        <h2>方案 C：魔法肖像</h2>
        <img src="icon-new-c.svg">
        <p>暖色渐变日出风 + 动漫大眼人像 + 魔法棒 + 闪亮星星。活泼可爱，女性用户友好。</p>
        <span class="tag">动漫大眼 · 魔法棒 · 暖色活泼</span>
    </div>
</div>
</body>
</html>
