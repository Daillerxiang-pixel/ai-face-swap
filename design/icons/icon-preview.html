<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI换图 APP Icon 设计方案对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a0f;
    color: #fff;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
    min-height: 100vh;
}
h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #7C3AED, #3B82F6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
}
.subtitle { color: #8E8E93; font-size: 14px; margin-top: 8px; text-align: center; }
.versions {
    display: flex;
    flex-direction: row;
    gap: 60px;
    flex-wrap: wrap;
    justify-content: center;
}
.version {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}
.version-label {
    font-size: 16px;
    font-weight: 600;
    color: #A78BFA;
}
.version-desc {
    font-size: 13px;
    color: #8E8E93;
    max-width: 280px;
    text-align: center;
    line-height: 1.5;
}
.icon-showcase {
    display: flex;
    flex-direction: row;
    align-items: end;
    gap: 20px;
}
.icon-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.icon-box span {
    font-size: 11px;
    color: #48484A;
}
.icon-box img {
    border-radius: 22%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.recommended {
    border: 2px solid #7C3AED;
    border-radius: 20px;
    padding: 30px;
    position: relative;
}
.recommended::before {
    content: "RECOMMENDED";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #7C3AED, #3B82F6);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 16px;
    border-radius: 10px;
    letter-spacing: 1px;
}
.phone-preview {
    display: flex;
    flex-direction: row;
    gap: 30px;
    align-items: center;
}
.phone {
    width: 200px;
    height: 400px;
    border-radius: 30px;
    background: #000;
    border: 2px solid #2C2C2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 50px;
    gap: 10px;
    position: relative;
}
.phone::before {
    content: "";
    position: absolute;
    top: 16px;
    width: 60px;
    height: 20px;
    background: #1C1C1E;
    border-radius: 10px;
}
.phone img {
    width: 60px;
    height: 60px;
    border-radius: 14px;
}
.phone .app-name {
    font-size: 11px;
    color: #8E8E93;
    margin-top: 4px;
}
.section-title {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    text-align: center;
}
.size-grid {
    display: flex;
    flex-direction: row;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
}
.size-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: #1C1C1E;
    border-radius: 12px;
    padding: 12px;
}
.size-item span { font-size: 10px; color: #8E8E93; }
</style>
</head>
<body>

<h1>AI换图 APP Icon 设计方案</h1>
<p class="subtitle">设计风格：iOS 原生 / 深色主题 / 紫蓝渐变 / 极简主义</p>

<div class="versions">
    <!-- V1 -->
    <div class="version">
        <div class="version-label">V1 · 人脸剪影</div>
        <div class="version-desc">双人脸轮廓 + 弧线换脸箭头，直接表达换脸概念</div>
        <div class="icon-showcase">
            <div class="icon-box">
                <img src="icon-v1-1024.png" width="180" height="180">
                <span>1024px</span>
            </div>
        </div>
    </div>
    
    <!-- V2 -->
    <div class="version">
        <div class="version-label">V2 · 抽象圆形</div>
        <div class="version-desc">双圆重叠 + 虚线目标圆 + 换向箭头，更现代抽象</div>
        <div class="icon-showcase">
            <div class="icon-box">
                <img src="icon-v2-1024.png" width="180" height="180">
                <span>1024px</span>
            </div>
        </div>
    </div>
    
    <!-- V3 Recommended -->
    <div class="version">
        <div class="version-label recommended">V3 · 精致双脸</div>
        <div class="version-desc">渐变描边轮廓 + 实心面部细节 + 光效粒子 + 品牌色系，高端质感</div>
        <div class="icon-showcase">
            <div class="icon-box">
                <img src="icon-v3-1024.png" width="180" height="180">
                <span>1024px</span>
            </div>
        </div>
    </div>
</div>

<div class="section-title">V3 手机桌面效果模拟</div>
<div class="phone-preview">
    <div class="phone">
        <img src="icon-v3-192.png">
        <div class="app-name">AI换图</div>
    </div>
    <div class="phone">
        <img src="icon-v3-192.png">
        <div class="app-name">AI换图</div>
    </div>
</div>

<div class="section-title">V3 全尺寸预览</div>
<div class="size-grid">
    <div class="size-item">
        <img src="icon-v3-192.png" width="48" height="48">
        <span>192px</span>
    </div>
    <div class="size-item">
        <img src="icon-v3-144.png" width="48" height="48">
        <span>144px</span>
    </div>
    <div class="size-item">
        <img src="icon-v3-96.png" width="48" height="48">
        <span>96px</span>
    </div>
    <div class="size-item">
        <img src="icon-v3-72.png" width="48" height="48">
        <span>72px</span>
    </div>
    <div class="size-item">
        <img src="icon-v3-48.png" width="48" height="48">
        <span>48px</span>
    </div>
</div>

</body>
</html>
