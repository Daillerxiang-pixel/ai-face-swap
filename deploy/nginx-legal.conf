# AI 换图 - Nginx 反向代理配置
# 域名：test.kanashortplay.com

# HTTP -> HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name test.kanashortplay.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.kanashortplay.com;

    # SSL 证书（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/test.kanashortplay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.kanashortplay.com/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 法律文档（隐私政策、技术支持）
    location /legal/ {
        alias /var/www/ai-face-swap/public/legal/;
        default_type text/html;
    }

    # 管理后台
    location /admin {
        alias /var/www/ai-face-swap/admin;
        try_files $uri $uri/ /admin/login.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        index login.html;
    }

    # 静态文件（用户端前端）
    location / {
        root /var/www/ai-face-swap/prototype;
        try_files $uri $uri/ /index.html;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # APK 下载
    location /face_swap.apk {
        alias /var/www/ai-face-swap/downloads/face_swap.apk;
        add_header Content-Disposition "attachment; filename=face_swap.apk";
        expires 1h;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # 日志
    access_log /var/log/nginx/ai-face-swap-access.log;
    error_log /var/log/nginx/ai-face-swap-error.log;

}