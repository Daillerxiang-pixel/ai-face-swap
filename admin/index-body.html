<script>if(!checkAuth()) throw 'auth';</script>
<div class="flex flex-col gap-6">
  <!-- Stats -->
  <div class="grid grid-cols-6 gap-4" x-data="{ stats:{}, loading:true, error:'' }" x-init="API.get('/dashboard').then(d=>{stats=d.stats}).catch(e=>error=e.message).finally(()=>loading=false)">
    <template x-if="loading"><div class="col-span-6" x-html="loadingSpinner()"></div></template>
    <template x-if="!loading">
      <div class="grid grid-cols-6 gap-4">
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">总用户数</div><div class="text-2xl font-bold text-gray-800" x-text="stats.totalUsers||0"></div></div>
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">今日新增</div><div class="text-2xl font-bold text-green-600" x-text="stats.todayUsers||0"></div></div>
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">总生成次数</div><div class="text-2xl font-bold text-gray-800" x-text="stats.totalGenerations||0"></div></div>
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">今日生成</div><div class="text-2xl font-bold text-blue-600" x-text="stats.todayGenerations||0"></div></div>
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">VIP用户</div><div class="text-2xl font-bold text-purple-600" x-text="stats.vipUsers||0"></div></div>
        <div class="bg-white rounded-lg border p-4"><div class="text-xs text-gray-400 mb-1">活跃模板</div><div class="text-2xl font-bold text-amber-600" x-text="stats.totalTemplates||0"></div></div>
      </div>
    </template>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-3 gap-4" x-data="{ trend:[], planStats:[], loading:true }" x-init="
    API.get('/dashboard').then(d=>{
      trend=d.trend||[];
      planStats=d.planStats||[];
      $nextTick(renderCharts);
    }).finally(()=>loading=false)">

    <div class="col-span-2 bg-white rounded-lg border p-4">
      <div class="text-sm font-medium text-gray-700 mb-3">近 7 天生成趋势</div>
      <canvas id="trendChart" height="100"></canvas>
    </div>
    <div class="bg-white rounded-lg border p-4">
      <div class="text-sm font-medium text-gray-700 mb-3">套餐用户分布</div>
      <canvas id="planChart" height="160"></canvas>
    </div>

    <div class="col-span-3 text-xs text-gray-400">数据加载中...</div>
  </div>

  <!-- Recent -->
  <div class="bg-white rounded-lg border" x-data="{ items:[], loading:true }" x-init="
    API.get('/dashboard').then(d=>{items=d.recentGenerations||[]}).finally(()=>loading=false)">
    <div class="px-4 py-3 border-b font-medium text-sm text-gray-700">最近生成记录</div>
    <div x-show="loading" x-html="loadingSpinner()"></div>
    <div x-show="!loading && items.length===0" x-html="emptyState()"></div>
    <table x-show="!loading && items.length>0" class="w-full">
      <thead><tr><th>ID</th><th>用户</th><th>模板</th><th>类型</th><th>状态</th><th>创建时间</th></tr></thead>
      <tbody>
        <template x-for="item in items"><tr>
          <td class="font-mono text-xs text-gray-400" x-text="item.id.slice(0,8)"></td>
          <td x-text="item.user_name||'-'"></td>
          <td x-text="item.template_name||'-'"></td>
          <td x-html="statusBadge(item.type)"></td>
          <td x-html="statusBadge(item.status)"></td>
          <td x-text="formatDate(item.created_at)"></td>
        </tr></template>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
function renderCharts() {
  // Trend
  const tc = document.getElementById('trendChart');
  if (tc && this.trend && this.trend.length) {
    new Chart(tc, {
      type: 'line',
      data: {
        labels: this.trend.map(t => t.day || t.date || t.label),
        datasets: [{ label: '生成次数', data: this.trend.map(t => t.count), borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.1)', fill: true, tension: .4, pointRadius: 4, pointBackgroundColor: '#6366f1' }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
  }
  // Plan
  const pc = document.getElementById('planChart');
  if (pc && this.planStats && this.planStats.length) {
    new Chart(pc, {
      type: 'doughnut',
      data: {
        labels: this.planStats.map(p => p.name),
        datasets: [{ data: this.planStats.map(p => p.user_count), backgroundColor: ['#94a3b8','#6366f1','#a855f7','#f59e0b'], borderWidth: 0 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { padding: 12, font: { size: 12 } } } } }
    });
  }
}
</script>
