<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>API Test</title>
<script src="components.js"></script>
</head>
<body>
<h3>Admin API Test</h3>
<pre id="result">Loading...</pre>
<script>
(async function() {
  try {
    document.getElementById('result').textContent = 'Token: ' + API.getToken().substring(0, 30) + '...';
    const data = await API.get('/templates?limit=3');
    document.getElementById('result').textContent = 'OK! Got ' + data.list.length + ' templates:\n' + JSON.stringify(data.list.map(t => t.name), null, 2);
  } catch(e) {
    document.getElementById('result').textContent = 'ERROR: ' + e.message;
  }
})();
</script>
</body></html>
