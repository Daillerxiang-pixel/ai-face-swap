<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 - AI换图管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
[x-cloak]{display:none!important}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;margin:0}
input{font-size:14px}
</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg,#1e1b4b,#312e81,#1e293b)">

<div x-data="{ username:'', password:'', loading:false, error:'' }" class="w-96">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 mb-3">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    </div>
    <h1 class="text-xl font-bold text-white">AI换图管理后台</h1>
    <p class="text-gray-400 text-sm mt-1">请输入管理员账号登录</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-xl shadow-2xl p-7">
    <form @submit.prevent="
      loading=true; error='';
      fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})})
      .then(r=>r.json())
      .then(d=>{
        if(!d.success) throw new Error(d.error||'登录失败');
        localStorage.setItem('admin_token',d.data.token);
        localStorage.setItem('admin_info',JSON.stringify(d.data.admin));
        location.href='index.html';
      })
      .catch(e=>{error=e.message;loading=false;})
    ">
      <div x-show="error" x-cloak class="mb-4 p-2.5 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm" x-text="error"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
        <input x-model="username" type="text" required autocomplete="username" placeholder="请输入用户名"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input x-model="password" type="password" required autocomplete="current-password" placeholder="请输入密码"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20">
      </div>

      <button type="submit" :disabled="loading"
              class="w-full py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
        <span x-show="!loading">登 录</span>
        <span x-show="loading" x-cloak>登录中...</span>
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-5">默认账号 admin / admin123</p>
  </div>
</div>

<script>if(localStorage.getItem('admin_token')) location.href='index.html';</script>
</body>
</html>
