<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>模板管理 - AI换图管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak]{display:none!important}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft Yahei',sans-serif;font-size:14px;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}table{border-collapse:collapse}th{background:#f8fafc;font-weight:500;text-align:left;color:#64748b;font-size:13px;padding:10px 12px;border-bottom:1px solid #e5e7eb}td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#374151;font-size:13px}tbody tr:hover{background:#f8fafc}.btn{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:none;transition:all .15s}.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}.btn-ghost{background:transparent;color:#6366f1}.btn-ghost:hover{background:#eef2ff}.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}.btn-warn{background:#fef3c7;color:#d97706}.btn-warn:hover{background:#fde68a}input,select,textarea{font-size:13px;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;outline:none}input:focus,select:focus,textarea:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.15)}</style>
<script src="components.js"></script>
</head><body class="h-screen overflow-hidden bg-gray-50">
<script>if(!checkAuth()) throw 'auth';</script>
<div class="flex h-screen">
  <aside style="width:240px;min-width:240px;background:linear-gradient(180deg,#1e293b,#0f172a)" class="flex flex-col text-white">
    <div class="h-14 flex items-center px-5 border-b border-white/10"><div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mr-2.5"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><span class="text-base font-bold">AI换图后台</span></div>
    <nav class="flex-1 py-3 px-3"><ul class="space-y-0.5">
      <li><a href="index.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>仪表盘</span></a></li>
      <li><a href="users.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg><span>用户管理</span></a></li>
      <li><a href="templates.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm bg-indigo-600/90 text-white shadow"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>模板管理</span></a></li>
      <li><a href="plans.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg><span>套餐管理</span></a></li>
      <li><a href="generations.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span>生成记录</span></a></li>
      <li><a href="orders.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>订单管理</span></a></li>
    </ul></nav>
    <div class="px-3 py-3 border-t border-white/10"><a href="#" onclick="event.preventDefault();localStorage.removeItem('admin_token');localStorage.removeItem('admin_info');location.href='login.html'" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-red-400 hover:bg-red-500/10 hover:text-red-300"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>退出登录</span></a></div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6">
      <h1 class="text-base font-semibold text-gray-800">模板管理</h1>
      <button class="btn btn-primary" @click="openAdd()">+ 新增模板</button>
    </header>

    <main class="flex-1 overflow-auto p-6 bg-gray-50" x-data="tplPage()">
      <div class="flex items-center gap-3 mb-4">
        <input x-model="search" @keydown.enter="page=1;load()" placeholder="搜索名称/场景" class="w-56">
        <select x-model="typeFilter" @change="page=1;load()"><option value="">全部类型</option><option value="图片">图片</option><option value="视频">视频</option></select>
        <select x-model="providerFilter" @change="page=1;load()"><option value="">全部Provider</option><option value="tencent">腾讯云</option><option value="replicate">Replicate</option><option value="akool">Akool</option></select>
        <button class="btn btn-primary" @click="page=1;load()">搜索</button>
      </div>

      <div class="bg-white rounded-lg border border-gray-200/80">
        <div x-show="loading" x-html="loadingSpinner()"></div>
        <div x-show="!loading && items.length===0" x-html="emptyState()"></div>
        <table x-show="!loading && items.length>0" class="w-full">
          <thead><tr><th>ID</th><th>预览</th><th>名称</th><th>场景</th><th>类型</th><th>Provider</th><th>使用次数</th><th>评分</th><th>状态</th><th>操作</th></tr></thead>
          <tbody><template x-for="t in items" :key="t.id"><tr>
            <td class="text-gray-400" x-text="t.id"></td>
            <td><img :src="fixUrl(t.preview_url)" class="w-10 h-10 rounded object-cover bg-gray-100" onerror="this.style.display='none'"></td>
            <td class="font-medium" x-text="t.name"></td>
            <td x-text="t.scene"></td>
            <td x-html="statusBadge(t.type)"></td>
            <td><span class="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-600" x-text="t.provider"></span></td>
            <td x-text="t.usage_count"></td>
            <td x-text="t.rating"></td>
            <td x-html="t.is_active ? statusBadge('active') : statusBadge('offline')"></td>
            <td class="space-x-1">
              <button class="btn btn-ghost" @click="openEdit(t)">编辑</button>
              <button class="btn btn-warn" @click="toggleActive(t)" x-text="t.is_active?'停用':'启用'"></button>
              <button class="btn btn-danger" @click="del(t)">删除</button>
            </td>
          </tr></template></tbody>
        </table>
        <div x-show="!loading && totalPages > 1" class="flex items-center justify-between mt-4 text-sm">
          <span class="text-gray-500" x-text="'共 '+total+' 条记录'"></span>
          <div class="flex items-center gap-1">
            <button @click="goPage(page-1)" :disabled="page<=1" class="px-3 py-1 text-sm rounded border border-gray-300 text-gray-600 hover:bg-gray-50 disabled:text-gray-300 disabled:cursor-not-allowed">上一页</button>
            <template x-for="i in pageRange" :key="i"><template x-if="i==='...'"><span class="px-2 text-gray-400">...</span></template><template x-if="i!=='...'"><button @click="goPage(i)" :class="i===page?'bg-indigo-600 text-white border-indigo-600':'text-gray-600 border-gray-300 hover:bg-gray-50'" class="px-3 py-1 text-sm rounded border" x-text="i"></button></template></template>
            <button @click="goPage(page+1)" :disabled="page>=totalPages" class="px-3 py-1 text-sm rounded border border-gray-300 text-gray-600 hover:bg-gray-50 disabled:text-gray-300 disabled:cursor-not-allowed">下一页</button>
          </div>
        </div>
      </div>

      <!-- 编辑/新增弹窗 -->
      <template x-if="showModal">
        <div class="modal-overlay" @click.self="showModal=false">
          <div class="modal" style="width:560px">
            <div class="p-5 border-b flex items-center justify-between"><span class="font-semibold" x-text="editId?'编辑模板':'新增模板'"></span><button @click="showModal=false" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button></div>
            <div class="p-5 grid grid-cols-2 gap-3">
              <div><label class="block text-sm text-gray-600 mb-1">名称 *</label><input x-model="form.name" class="w-full"></div>
              <div><label class="block text-sm text-gray-600 mb-1">图标</label><input x-model="form.icon" class="w-full" placeholder="🎬"></div>
              <div><label class="block text-sm text-gray-600 mb-1">场景</label><input x-model="form.scene" class="w-full"></div>
              <div><label class="block text-sm text-gray-600 mb-1">类型</label><select x-model="form.type" class="w-full"><option value="图片">图片</option><option value="视频">视频</option></select></div>
              <div><label class="block text-sm text-gray-600 mb-1">Provider</label><select x-model="form.provider" class="w-full"><option value="tencent">腾讯云</option><option value="replicate">Replicate</option><option value="akool">Akool</option></select></div>
              <div><label class="block text-sm text-gray-600 mb-1">Model ID</label><input x-model="form.provider_model_id" class="w-full"></div>
              <div class="col-span-2"><label class="block text-sm text-gray-600 mb-1">预览图 URL</label><input x-model="form.preview_url" class="w-full" placeholder="/uploads/previews/xxx.jpg"></div>
              <div class="col-span-2"><label class="block text-sm text-gray-600 mb-1">视频 URL</label><input x-model="form.video_url" class="w-full"></div>
              <div><label class="block text-sm text-gray-600 mb-1">标签</label><input x-model="form.badge" class="w-full" placeholder="hot/new/vip"></div>
              <div><label class="block text-sm text-gray-600 mb-1">描述</label><input x-model="form.description" class="w-full"></div>
            </div>
            <div class="p-4 border-t flex justify-end gap-2">
              <button class="btn" style="border:1px solid #e5e7eb;color:#64748b" @click="showModal=false">取消</button>
              <button class="btn btn-primary" @click="save()">保存</button>
            </div>
          </div>
        </div>
      </template>
    </main>
  </div>
</div>
<script>
var OSS_BASE = 'https://aihuantu.oss-cn-beijing.aliyuncs.com';
function fixUrl(u) { return (!u || u.indexOf('http')===0) ? (u||'') : OSS_BASE + u; }

function tplPage() {
  return {
    items: [], total: 0, page: 1, limit: 20,
    search: '', typeFilter: '', providerFilter: '',
    loading: true, showModal: false, form: {}, editId: null,

    get totalPages() { return Math.ceil(this.total / this.limit) || 1; },
    get pageRange() {
      var p = this.page, t = this.totalPages, r = [];
      if (t <= 7) { for (var i=1;i<=t;i++) r.push(i); }
      else { r.push(1); if (p>3) r.push('...'); for (var i=Math.max(2,p-1);i<=Math.min(t-1,p+1);i++) r.push(i); if (p<t-2) r.push('...'); r.push(t); }
      return r;
    },

    init() { this.load(); },

    load() {
      var self = this;
      self.loading = true;
      var url = '/templates?limit=' + self.limit + '&page=' + self.page;
      if (self.search) url += '&search=' + encodeURIComponent(self.search);
      if (self.typeFilter) url += '&type=' + encodeURIComponent(self.typeFilter);
      if (self.providerFilter) url += '&provider=' + encodeURIComponent(self.providerFilter);
      API.get(url).then(function(data) {
        self.items = data.list.map(function(t) { return Object.assign({}, t, {preview_url: fixUrl(t.preview_url), video_url: fixUrl(t.video_url)}); });
        self.total = data.total;
        self.loading = false;
      }).catch(function(e) { self.loading = false; Toast.error(e.message); });
    },

    goPage(p) { this.page = p; this.load(); },

    openAdd() {
      this.editId = null;
      this.form = {name:'',icon:'',scene:'',type:'图片',provider:'akool',provider_model_id:'',preview_url:'',video_url:'',description:'',badge:''};
      this.showModal = true;
    },

    openEdit(t) {
      this.editId = t.id;
      this.form = {name:t.name,icon:t.icon||'',scene:t.scene||'',type:t.type||'图片',provider:t.provider||'akool',provider_model_id:t.provider_model_id||'',preview_url:t.preview_url||'',video_url:t.video_url||'',description:t.description||'',badge:t.badge||''};
      this.showModal = true;
    },

    save() {
      var self = this;
      if (!self.form.name) { Toast.warning('请输入模板名称'); return; }
      if (self.editId) {
        API.put('/templates/' + self.editId, self.form).then(function() { Toast.success('模板已更新'); self.showModal = false; self.load(); }).catch(function(e) { Toast.error(e.message); });
      } else {
        API.post('/templates', self.form).then(function() { Toast.success('模板已创建'); self.showModal = false; self.load(); }).catch(function(e) { Toast.error(e.message); });
      }
    },

    toggleActive(t) {
      var self = this;
      var newVal = t.is_active ? 0 : 1;
      var action = newVal ? '启用' : '停用';
      confirmDialog('确定' + action + '模板 "' + t.name + '" 吗？', function() {
        API.put('/templates/' + t.id, {is_active: newVal}).then(function() { Toast.success('模板已' + action); self.load(); }).catch(function(e) { Toast.error(e.message); });
      });
    },

    del(t) {
      var self = this;
      confirmDialog('确定删除模板 "' + t.name + '" 吗？此操作不可恢复。', function() {
        API.del('/templates/' + t.id).then(function() { Toast.success('模板已删除'); self.load(); }).catch(function(e) { Toast.error(e.message); });
      });
    }
  };
}
</script>
</body></html>
