<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=1280">
<title>套餐管理 - AI换图管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak]{display:none!important}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft Yahei',sans-serif;font-size:14px;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}.btn{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:none;transition:all .15s}.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}.btn-ghost{background:transparent;color:#6366f1}.btn-ghost:hover{background:#eef2ff}.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}.btn-sm{padding:3px 8px;font-size:12px}input,select,textarea{font-size:13px;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;outline:none}input:focus,select:focus,textarea:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.15)}</style>
<script src="components.js"></script>
</head><body class="h-screen overflow-hidden bg-gray-50">
<script>if(!checkAuth()) throw 'auth';</script>
<div class="flex h-screen">
  <aside style="width:240px;min-width:240px;background:linear-gradient(180deg,#1e293b,#0f172a)" class="flex flex-col text-white">
    <div class="h-14 flex items-center px-5 border-b border-white/10"><div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mr-2.5"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><span class="text-base font-bold">AI换图后台</span></div>
    <nav class="flex-1 py-3 px-3"><ul class="space-y-0.5">
      <li><a href="index.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>仪表盘</span></a></li>
      <li><a href="users.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg><span>用户管理</span></a></li>
      <li><a href="templates.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>模板管理</span></a></li>
      <li><a href="plans.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm bg-indigo-600/90 text-white shadow"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg><span>套餐管理</span></a></li>
      <li><a href="generations.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span>生成记录</span></a></li>
      <li><a href="orders.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>订单管理</span></a></li>
    </ul></nav>
    <div class="px-3 py-3 border-t border-white/10"><a href="#" onclick="event.preventDefault();localStorage.removeItem('admin_token');localStorage.removeItem('admin_info');location.href='login.html'" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-red-400 hover:bg-red-500/10 hover:text-red-300"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg><span>退出登录</span></a></div>
  </aside>
  <div class="flex-1 flex flex-col min-w-0">
    <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6">
      <h1 class="text-base font-semibold text-gray-800">套餐管理</h1>
      <button class="btn btn-primary" @click="openAdd()">+ 新增套餐</button>
    </header>
    <main class="flex-1 overflow-auto p-6 bg-gray-50" x-data="planPage()">
      <div x-show="loading" x-html="loadingSpinner()"></div>
      <div x-show="!loading && plans.length===0" x-html="emptyState('暂无套餐，点击右上角添加')"></div>
      <div class="grid grid-cols-4 gap-4" x-show="!loading && plans.length>0">
        <template x-for="p in plans" :key="p.id">
          <div class="bg-white rounded-xl border border-gray-200/80 p-5 flex flex-col" :class="p.is_active?'':'opacity-60'">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm font-semibold text-gray-800" x-text="p.name"></span>
              <div class="flex items-center gap-1">
                <button class="btn btn-ghost btn-sm" @click="openEdit(p)">编辑</button>
                <button class="btn btn-danger btn-sm" @click="delPlan(p)">删除</button>
              </div>
            </div>
            <div class="flex items-baseline gap-1 mb-1">
              <span class="text-3xl font-bold text-indigo-600" x-text="'¥'+(p.price||0)"></span>
              <span class="text-sm text-gray-400" x-text="p.duration==='monthly'?'/月':p.duration==='yearly'?'/年':''"></span>
            </div>
            <div x-show="p.original_price && p.original_price > p.price" class="text-xs text-gray-400 line-through mb-3" x-text="'原价 ¥'+p.original_price"></div>
            <div class="space-y-1.5 text-sm text-gray-600 flex-1">
              <div class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg><span>每月 <strong x-text="p.monthly_limit"></strong> 次生成</span></div>
              <template x-for="f in (Array.isArray(p.features)?p.features:[])" :key="f">
                <div class="flex items-center gap-1.5" x-show="f.trim()"><svg class="w-3.5 h-3.5 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg><span x-text="f"></span></div>
              </template>
            </div>
            <div class="mt-4 pt-3 border-t flex items-center justify-between">
              <span x-html="p.is_active ? statusBadge('active') : statusBadge('offline')"></span>
              <span class="text-xs text-gray-400">排序: <span x-text="p.sort_order"></span></span>
            </div>
          </div>
        </template>
      </div>
      <template x-if="showModal">
        <div class="modal-overlay" @click.self="showModal=false">
          <div class="modal" style="width:480px">
            <div class="p-5 border-b flex items-center justify-between"><span class="font-semibold" x-text="editId?'编辑套餐':'新增套餐'"></span><button @click="showModal=false" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button></div>
            <div class="p-5 space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-sm text-gray-600 mb-1">名称 *</label><input x-model="form.name" class="w-full"></div>
                <div><label class="block text-sm text-gray-600 mb-1">周期</label><select x-model="form.duration" class="w-full"><option value="monthly">月度</option><option value="yearly">年度</option><option value="free">免费</option></select></div>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div><label class="block text-sm text-gray-600 mb-1">价格 (元)</label><input x-model.number="form.price" type="number" step="0.01" class="w-full"></div>
                <div><label class="block text-sm text-gray-600 mb-1">原价</label><input x-model.number="form.original_price" type="number" step="0.01" class="w-full"></div>
                <div><label class="block text-sm text-gray-600 mb-1">月配额</label><input x-model.number="form.monthly_limit" type="number" class="w-full"></div>
              </div>
              <div><label class="block text-sm text-gray-600 mb-1">功能特性（每行一条）</label><textarea x-model="form.features" rows="4" class="w-full" placeholder="高清无水印&#10;优先处理队列&#10;专属客服"></textarea></div>
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-sm text-gray-600 mb-1">排序</label><input x-model.number="form.sort_order" type="number" class="w-full"></div>
                <div class="flex items-end gap-2 pb-0.5"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" x-model="form.is_active" class="w-4 h-4 accent-indigo-600"><span class="text-sm text-gray-600">启用</span></label></div>
              </div>
            </div>
            <div class="p-4 border-t flex justify-end gap-2">
              <button class="btn" style="border:1px solid #e5e7eb;color:#64748b" @click="showModal=false">取消</button>
              <button class="btn btn-primary" @click="save()">保存</button>
            </div>
          </div>
        </div>
      </template>
    </main>
  </div>
</div>
<script>
function planPage() {
  return {
    plans: [], loading: true, showModal: false, editId: null,
    form: {}, saving: false,
    init() { this.load(); },
    load() {
      var self = this;
      self.loading = true;
      API.get('/plans').then(function(r) {
        self.plans = r; self.loading = false;
      }).catch(function(e) { self.loading = false; Toast.error(e.message); });
    },
    openAdd() {
      this.editId = null;
      this.form = {name:'',duration:'monthly',price:0,original_price:0,monthly_limit:50,features:'',sort_order:0,is_active:true};
      this.showModal = true;
    },
    openEdit(p) {
      this.editId = p.id;
      this.form = {name:p.name,duration:p.duration||'monthly',price:p.price,original_price:p.original_price,monthly_limit:p.monthly_limit,features:Array.isArray(p.features)?p.features.join('\n'):(p.features||''),sort_order:p.sort_order,is_active:!!p.is_active};
      this.showModal = true;
    },
    save() {
      var self = this;
      if (!self.form.name) { Toast.warning('请输入套餐名称'); return; }
      var payload = Object.assign({}, self.form, {features: (typeof self.form.features==='string' ? self.form.features.split('\n').filter(Boolean) : self.form.features)});
      if (self.editId) {
        API.put('/plans/' + self.editId, payload).then(function() { Toast.success('套餐已更新'); self.showModal = false; self.load(); }).catch(function(e) { Toast.error(e.message); });
      } else {
        API.post('/plans', payload).then(function() { Toast.success('套餐已创建'); self.showModal = false; self.load(); }).catch(function(e) { Toast.error(e.message); });
      }
    },
    delPlan(p) {
      var self = this;
      confirmDialog('确定删除套餐「' + p.name + '」？', function() {
        API.del('/plans/' + p.id).then(function() { Toast.success('已删除'); self.load(); }).catch(function(e) { Toast.error(e.message); });
      });
    }
  };
}
</script>
</body></html>
